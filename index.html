.glass-morphism {

}

}

.nav-container {

}

.nav-link.active {

.card-description {
  color: var(--secondary-text);

.features-grid {
  padding: 4rem 2rem;

.feature-card {
  background: var(--secondary-bg);

}

.stats-container {

.contact-section {
